<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <section class=" py-4 sticky top-0 bg-white z-50 shadow-lg">
        <div class="flex justify-between items-center container mx-auto">
            <div>
                <img class="w-40 mx-4" src="https://saasto.wprealizer.com/wp-content/uploads/2023/07/Logo-v3-1.svg"
                    alt="">
            </div>
            <div class="hidden lg:flex gap-5 text-[#332C5C] font-medium  text-lg">
                <a class="hover:text-[#5bc17f] hover:underline" href="">Home</a>
                <a class="hover:text-[#5bc17f] hover:underline" href="">About Us</a>
                <a class="hover:text-[#5bc17f] hover:underline" href="">Blog</a>
                <a class="hover:text-[#5bc17f] hover:underline" href="">Contact</a>
            </div>
            <div class="flex items-center gap-20">
                <a class="hidden text-[#5bc17f]" href="">Login</a>
                <button class="bg-[#5bc17f] text-white px-8 py-3 rounded-md hover:bg-[#3CAB66] mx-4">Sign Up</button>
            </div>
        </div>
    </section>
    <section class="flex flex-col-reverse lg:flex-row justify-between items-center gap-20 container mx-auto py-4 p-5">
        <div class="flex-1">
            <h2 class="text-[36px] lg:text-[54px] xl:text[64px] md:text-[42px] text-[#18063C] font-bold">Manage
                Your <span class="text-[#5bc17f]">Business</span> Finance Easily</h2>
            <p class="text-[20px] text-[#404040CC] mt-3 lg:mt-6 mb-6 lg:mb-12">An enim nullam tempor sapien gravida
                donec enim ipsum porta justo
                congue magna at pretium purus pretium ligula</p>
            <button
                class="bg-[#5bc17f] text-white px-8 py-4 rounded-md hover:bg-[#3CAB66] mt-4 transition-all duration-300 shadow-lg">Start
                14 Days
                Trial</button>
        </div>
        <div class="flex-1 flex  justify-center">
            <img class="object-contain mt-10"
                src="https://saasto.wprealizer.com/wp-content/uploads/2023/08/hero-screen-3.png" alt="">
        </div>
    </section>
    <section class="grid grid-cols-2 lg:grid-cols-4 gap-10 justify-between items-center container mx-auto px-4 mt-20">
        <div class="flex flex-col text-center justify-center items-center">
            <h2 class="xl:text-[64px]  lg:text-[46px] text-[36px] text-center lg:text-left">115k+</h2>
            <p class="text-[18px] text-center lg:text-left">Active User</p>
        </div>
        <div class="border-l-2 pl-10 flex flex-col text-center justify-center items-center">
            <h2 class="xl:text-[64px] lg:text-[46px] text-[36px] text-center lg:text-left">88k</h2>
            <p class="text-[18px] text-center lg:text-left">User Passive</p>
        </div>
        <div class="lg:border-l-2 pl-10 flex flex-col text-center justify-center items-center">
            <h2 class="xl:text-[64px]  lg:text-[46px] text-[36px] text-center lg:text-left">30%</h2>
            <p class="text-[18px] text-center lg:text-left">Increase in User</p>
        </div>
        <div class="border-l-2 pl-10 flex flex-col text-center justify-center items-center">
            <h2 class="xl:text-[64px] lg:text-[46px] text-[36px] text-center lg:text-left">10k</h2>
            <p class="text-[18px] text-center lg:text-left">Good Tesinonials</p>
        </div>

    </section>
</body>

</html>
